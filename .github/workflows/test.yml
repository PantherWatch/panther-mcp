name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv tool install ruff
          ruff check .
          ruff format --check .

      - name: Run tests
        env:
          PANTHER_API_KEY: pthr_test
        run: uv run pytest tests/ -v
